name: ggi_canteen
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  fluttertoast: ^8.2.10
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^8.0.0
  flutter_paypal: ^0.2.1
  # Updated to a version that supports the modern Flutter Android embedding
  razorpay_flutter: ^1.3.5
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/hero_icon1.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
